<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji Hunter - Expanded Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Arial', sans-serif; 
            touch-action: none;
            display: flex;
            height: 100vh;
        }

        /* サイドバー（カメラ映像外に固定） */
        #sidebar {
            width: 180px;
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 20px 10px;
            box-sizing: border-box;
            gap: 20px;
            z-index: 20;
        }

        .info { font-size: 32px; font-weight: bold; line-height: 1.2; text-align: center; }
        #score { color: #0f0; }
        #timer { color: #f00; }

        /* ゲーム領域 */
        #container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-screen {
            position: relative;
            height: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        #ui-layer {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            pointer-events: none; 
            color: white; 
            text-shadow: 2px 2px 4px #000;
        }

        #msg { 
            position: absolute; 
            top: 45%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 5vh; 
            text-align: center; 
            color: #0f0;
            white-space: pre-wrap;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="score" class="info">Score<br>0</div>
        <div id="timer" class="info">Time<br>60</div>
    </div>

    <div id="container">
        <div id="game-screen">
            <video id="input_video" style="display:none" playsinline></video>
            <canvas id="output_canvas"></canvas>
            
            <div id="ui-layer">
                <div id="msg">カメラを起動中...</div>
            </div>
        </div>
    </div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const scoreElement = document.getElementById('score');
const timerElement = document.getElementById('timer');
const msgElement = document.getElementById('msg');
const gameScreen = document.getElementById('game-screen');

let score = 0;
let gameStarted = false;
let startTime = 0;
const gameDuration = 60; 
let countdown = gameDuration;

let fpo1x = 0.5, fpo1y = 0.5; 
let hiritu = 1.0;
let circles = [];

let cursorRadius = 0;
let targetBgRadius = 0;

const emojiList = ['😂', '😍', '😀', '😃', '😄', '😅', '😆', '😊'];
let currentTargetEmoji = "";

let hitEffectTimer = 0;
let canScore = true;
let hasClosedMouth = true;
let isCoolDown = false;
let isHoveringCorrectTarget = false;

let audioCtx = null;
const speech = window.speechSynthesis;

function speak(text) {
    if (speech.speaking) speech.cancel();
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = 'ja-JP';
    speech.speak(uttr);
}

function beep(freq = 1000) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.stop(audioCtx.currentTime + 0.2);
    } catch(e) {}
}

function nextProblem() {
    currentTargetEmoji = emojiList[Math.floor(Math.random() * emojiList.length)];
    
    // 【修正】上位置(0.12)を維持したまま、中段・下段の間隔を広げ、下方向に拡大
    const positions = [
        {rx: 0.18, ry: 0.12}, {rx: 0.50, ry: 0.12}, {rx: 0.82, ry: 0.12}, // 上段
        {rx: 0.15, ry: 0.48},                       {rx: 0.85, ry: 0.48}, // 中段
        {rx: 0.18, ry: 0.84}, {rx: 0.50, ry: 0.84}, {rx: 0.82, ry: 0.84}  // 下段を大幅に下へ
    ];
    
    let shuffledEmojis = [...emojiList].sort(() => Math.random() - 0.5);
    circles = positions.map((p, i) => ({ ...p, emoji: shuffledEmojis[i] }));
}

function onResults(results) {
    const w = gameScreen.clientWidth;
    const h = gameScreen.clientHeight;
    
    if (canvasElement.width !== w || canvasElement.height !== h) {
        canvasElement.width = w;
        canvasElement.height = h;
        // 【修正】円の半径を1.1倍に調整
        cursorRadius = h * 0.11;
        targetBgRadius = h * 0.143;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, w, h);
    canvasCtx.drawImage(results.image, 0, 0, w, h);

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        hiritu = (landmarks[152].y - landmarks[10].y) / 0.35;
        
        const rawX = 0.5 - (fpo1x - landmarks[1].x) * 3; 
        const rawY = 0.5 - (fpo1y - landmarks[1].y) * 5; 
        const cursorX = Math.max(0, Math.min(1, rawX)) * w;
        const cursorY = Math.max(0, Math.min(1, rawY)) * h;

        const mouthOpenHeight = (landmarks[14].y - landmarks[13].y);
        const threshold = (0.015 - (Math.max(0, Math.min(1, rawY)) * 0.008)) * hiritu;
        const mouthOpen = mouthOpenHeight > threshold;

        if (gameStarted) {
            msgElement.innerText = "";

            // 中央ターゲット（中段の位置 ry: 0.48 に合わせて配置）
            canvasCtx.save();
            canvasCtx.translate(w / 2, h * 0.48); 
            canvasCtx.beginPath();
            canvasCtx.arc(0, 0, targetBgRadius, 0, 2 * Math.PI);
            canvasCtx.fillStyle = "orange";
            canvasCtx.fill();
            canvasCtx.lineWidth = 4;
            canvasCtx.strokeStyle = "white";
            canvasCtx.stroke();
            canvasCtx.scale(-1, 1);
            // 【修正】文字サイズを1.1倍に (0.18 -> 0.198)
            canvasCtx.font = `bold ${h * 0.198}px serif`;
            canvasCtx.textAlign = "center";
            canvasCtx.textBaseline = "middle";
            canvasCtx.strokeStyle = "black";
            canvasCtx.lineWidth = 6;
            canvasCtx.strokeText(currentTargetEmoji, 0, 0);
            canvasCtx.fillText(currentTargetEmoji, 0, 0);
            canvasCtx.restore();

            isHoveringCorrectTarget = false;

            // 周囲の選択肢
            circles.forEach(c => {
                const actualX = c.rx * w;
                const actualY = c.ry * h;

                canvasCtx.save();
                canvasCtx.translate(actualX, actualY);
                canvasCtx.scale(-1, 1); 
                // 【修正】文字サイズを1.1倍に (0.15 -> 0.165)
                canvasCtx.font = `${h * 0.165}px serif`;
                canvasCtx.textAlign = "center";
                canvasCtx.textBaseline = "middle";
                canvasCtx.fillText(c.emoji, 0, 0);
                canvasCtx.restore();

                const dist = Math.sqrt((cursorX - actualX)**2 + (cursorY - actualY)**2);
                if (dist < cursorRadius * 1.1) {
                    if (c.emoji === currentTargetEmoji) {
                        isHoveringCorrectTarget = true;
                        if (mouthOpen && canScore) {
                            score++;
                            scoreElement.innerHTML = `Score<br>${score}`;
                            beep(1200);
                            hitEffectTimer = 5;
                            canScore = false;
                            nextProblem(); 
                        }
                    } else if (mouthOpen && canScore) {
                        beep(400);
                        canScore = false;
                    }
                }
            });

            // カーソル
            canvasCtx.beginPath();
            canvasCtx.arc(cursorX, cursorY, cursorRadius, 0, 2 * Math.PI);
            canvasCtx.lineWidth = 8;
            canvasCtx.strokeStyle = (isHoveringCorrectTarget && mouthOpen) ? "#FF69B4" : "#00FF00";
            canvasCtx.stroke();
            
            if (hitEffectTimer > 0) {
                canvasCtx.beginPath();
                canvasCtx.arc(cursorX, cursorY, cursorRadius + (h * 0.05 - hitEffectTimer * (h * 0.01)), 0, 2 * Math.PI);
                canvasCtx.strokeStyle = "white";
                canvasCtx.lineWidth = 4;
                canvasCtx.stroke();
                hitEffectTimer--;
            }

            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            countdown = Math.max(0, gameDuration - elapsed);
            timerElement.innerHTML = `Time<br>${countdown}`;
            if (countdown <= 0) {
                gameStarted = false;
                hasClosedMouth = false;
                isCoolDown = true;
                speak(score + "点です。終了");
                setTimeout(() => { isCoolDown = false; }, 3000);
            }
        } else {
            canvasCtx.beginPath();
            canvasCtx.arc(cursorX, cursorY, cursorRadius, 0, 2 * Math.PI);
            canvasCtx.lineWidth = 8;
            canvasCtx.strokeStyle = "#00FF00";
            canvasCtx.stroke();

            if (isCoolDown) {
                msgElement.innerText = "終了！ スコア: " + score;
            } else if (!hasClosedMouth) {
                msgElement.innerText = "一度口を閉じてください";
            } else {
                msgElement.innerText = "口を開けてスタート！";
                if (mouthOpen) {
                    fpo1x = landmarks[1].x;
                    fpo1y = landmarks[1].y;
                    gameStarted = true;
                    startTime = Date.now();
                    score = 0;
                    scoreElement.innerHTML = `Score<br>0`;
                    canScore = false; 
                    nextProblem();
                    speak("スタート");
                }
            }
        }

        if (!mouthOpen) {
            canScore = true;
            hasClosedMouth = true;
        }
    }
    canvasCtx.restore();
}

const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});
faceMesh.setOptions({
    maxNumFaces: 1, refineLandmarks: false,
    minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
});
faceMesh.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => { await faceMesh.send({image: videoElement}); },
    width: 640, height: 480
});
camera.start();

window.addEventListener('resize', () => {
    nextProblem();
});
</script>
</body>
</html>
