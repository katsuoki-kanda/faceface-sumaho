<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Hunter - Responsive Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        
        /* 画面全体のラッパー */
        #wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* 左側のサイドバー */
        #sidebar {
            width: 200px; /* サイドバーの幅 */
            height: 100%;
            background: #222;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info { font-size: 36px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #score { color: #0f0; }
        #timer { color: #f00; }

        /* 右側のゲームコンテナ */
        #container {
            flex: 1; /* 残りの幅を占める */
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* キャンバス。object-fit: contain; でアスペクト比を維持しつつ、コンテナに収める */
        canvas { 
            display: block; 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            transform: scaleX(-1); 
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white; text-shadow: 2px 2px 4px #000;
        }
        
        #msg { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 40px; text-align: center; color: #0f0;
            white-space: pre-wrap;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <div id="sidebar">
            <div id="score" class="info">Score: 0</div>
            <div id="timer" class="info">Time: 60</div>
        </div>
        <div id="container">
            <video id="input_video" style="display:none" playsinline></video>
            <canvas id="output_canvas"></canvas>
            
            <div id="ui-layer">
                <div id="msg">カメラを起動中...</div>
            </div>
        </div>
    </div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const scoreElement = document.getElementById('score');
const timerElement = document.getElementById('timer');
const msgElement = document.getElementById('msg');

let score = 0;
let gameStarted = false;
let startTime = 0;
const gameDuration = 60; 
let countdown = gameDuration;

let fpo1x = 0.5, fpo1y = 0.5; 
let hiritu = 1.0;
let circles = [];

// サイズの調整 (1.2倍)
const cursorRadius = 65 * 1.2; // 78
const targetBgRadius = 85 * 1.2; // 102
// 中央オレンジ丸の半径

const emojiList = ['😂', '😍', '😀', '😃', '😄', '😅', '😆', '😊'];
let currentTargetEmoji = "";

let hitEffectTimer = 0;
let canScore = true;
let hasClosedMouth = true;
let isCoolDown = false;

// 現在ターゲット上にいて口を開けているか（色変更用フラグ）
let isHoveringCorrectTarget = false;

let audioCtx = null;

const speech = window.speechSynthesis;
function speak(text) {
    if (speech.speaking) speech.cancel();
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = 'ja-JP';
    speech.speak(uttr);
}

function beep(freq = 1000) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.stop(audioCtx.currentTime + 0.2);
    } catch(e) {}
}

function nextProblem() {
    currentTargetEmoji = emojiList[Math.floor(Math.random() * emojiList.length)];
    
    // 配置の調整 (全体を下へシフト、下段を大幅に下げる)
    // キャンバスサイズ 640x480 に対する相対座標
    const positions = [
        {x: 100, y: 90},  {x: 320, y: 80},  {x: 540, y: 90}, // 上段 (少し下げる)
        {x: 90, y: 260},                    {x: 550, y: 260}, // 中段 (少し下げる)
        {x: 100, y: 430}, {x: 320, y: 440}, {x: 540, y: 430}  // 下段 (大幅に下げる)
    ];
    let shuffledEmojis = [...emojiList].sort(() => Math.random() - 0.5);
    circles = positions.map((p, i) => ({ ...p, emoji: shuffledEmojis[i] }));
}

function onResults(results) {
    // コンテナのサイズに合わせてキャンバスの描画サイズを設定
    const container = document.getElementById('container');
    const containerW = container.clientWidth;
    const containerH = container.clientHeight;

    if (canvasElement.width !== containerW) {
        canvasElement.width = containerW;
        canvasElement.height = containerH;
    }
    const w = canvasElement.width;
    const h = canvasElement.height;

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, w, h);
    canvasCtx.drawImage(results.image, 0, 0, w, h);

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        hiritu = (landmarks[152].y - landmarks[10].y) / 0.35;
        const po1x = landmarks[1].x;
        const po1y = landmarks[1].y;

        const rawX = 0.5 - (fpo1x - po1x) * 4; 
        const relativeY = 0.5 - (fpo1y - po1y) * 6; 
        const cursorX = rawX * w;
        const cursorY = relativeY * h;

        const mouthOpenHeight = (landmarks[14].y - landmarks[13].y);
        const threshold = (0.015 - (Math.max(0, Math.min(1, relativeY)) * 0.008)) * hiritu;
        const mouthOpen = mouthOpenHeight > threshold;

        if (gameStarted) {
            msgElement.innerText = "";

            // --- 描画順：1.ターゲット -> 2.周囲絵文字と判定 -> 3.カーソル ---

            // 1. 中央のターゲット絵文字 (背景つき)
            canvasCtx.save();
            canvasCtx.translate(w / 2, h / 2);
            
            // 背景にオレンジ色の塗りつぶし円を追加
            canvasCtx.beginPath();
            canvasCtx.arc(0, 0, targetBgRadius, 0, 2 * Math.PI);
            canvasCtx.fillStyle = "orange";
            canvasCtx.fill();
            // オレンジ丸の縁取り（オプション）
            canvasCtx.lineWidth = 4 * 1.2; // 縁も1.2倍
            canvasCtx.strokeStyle = "white";
            canvasCtx.stroke();

            canvasCtx.scale(-1, 1);
            // フォントサイズの拡大 (130 -> 156)
            canvasCtx.font = "bold 156px serif"; 
            canvasCtx.textAlign = "center";
            canvasCtx.textBaseline = "middle";
            canvasCtx.strokeStyle = "black";
            canvasCtx.lineWidth = 6 * 1.2; // 縁も1.2倍
            canvasCtx.strokeText(currentTargetEmoji, 0, 0);
            canvasCtx.fillText(currentTargetEmoji, 0, 0);
            canvasCtx.restore();

            // 判定用フラグのリセット
            isHoveringCorrectTarget = false;

            // 2. 周囲の選択肢と判定
            circles.forEach(c => {
                canvasCtx.save();
                // 配置座標は相対的なまま、描画時にコンテナサイズに合わせる
                // 元の座標は 640x480 を想定しているので、それを w/h にマッピング
                const actualX = c.x / 640 * w;
                const actualY = c.y / 480 * h;
                canvasCtx.translate(actualX, actualY);
                canvasCtx.scale(-1, 1); 
                // フォントサイズの拡大 (100 -> 120)
                canvasCtx.font = "120px serif";
                canvasCtx.textAlign = "center";
                canvasCtx.textBaseline = "middle";
                canvasCtx.fillText(c.emoji, 0, 0);
                canvasCtx.restore();

                // 判定距離もコンテナサイズに合わせる
                const dist = Math.sqrt((cursorX - actualX)**2 + (cursorY - actualY)**2);
                const actualTargetRadius = 75 / 640 * w; // 元の75pxをコンテナサイズに換算
                if (dist < actualTargetRadius) {
                    // 正解のターゲット上にカーソルがある
                    if (c.emoji === currentTargetEmoji) {
                        isHoveringCorrectTarget = true;
                        // 口を開けた瞬間（決定時）の処理
                        if (mouthOpen && canScore) {
                            score++;
                            scoreElement.innerText = `Score: ${score}`;
                            beep(1200);
                            hitEffectTimer = 5;
                            canScore = false;
                            nextProblem(); 
                        }
                    } else if (mouthOpen && canScore) {
                        // 不正解のターゲット上で口を開けた
                        beep(400);
                        canScore = false;
                    }
                }
            });

            // 3. カーソル（リング）描画
            canvasCtx.beginPath();
            canvasCtx.arc(cursorX, cursorY, cursorRadius, 0, 2 * Math.PI);
            canvasCtx.lineWidth = 8 * 1.2; // 線幅も1.2倍
            
            // 決定時（正解上で口を開けた）は桃色、それ以外ははっきりした緑
            if (isHoveringCorrectTarget && mouthOpen) {
                canvasCtx.strokeStyle = "#FF69B4"; // HotPink（桃色）
            } else {
                canvasCtx.strokeStyle = "#00FF00"; // 不透明な緑（はっきり表示）
            }
            canvasCtx.stroke();
            
            // 正解時のエフェクト (白リング拡散)
            if (hitEffectTimer > 0) {
                canvasCtx.beginPath();
                // 拡散量も1.2倍
                const spread = (20 - hitEffectTimer * 4) * 1.2;
                canvasCtx.arc(cursorX, cursorY, cursorRadius + spread, 0, 2 * Math.PI);
                canvasCtx.strokeStyle = "white";
                canvasCtx.lineWidth = 4 * 1.2; // 線幅も1.2倍
                canvasCtx.stroke();
                hitEffectTimer--;
            }

            // タイマー処理
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            countdown = Math.max(0, gameDuration - elapsed);
            timerElement.innerText = `Time: ${countdown}`;
            if (countdown <= 0) {
                gameStarted = false;
                hasClosedMouth = false;
                isCoolDown = true;
                speak(score + "点です。終了");
                setTimeout(() => { isCoolDown = false; }, 3000);
            }
        } else {
            // 初期状態、およびゲーム開始前のカーソル描画 (はっきりした緑)
            canvasCtx.beginPath();
            canvasCtx.arc(cursorX, cursorY, cursorRadius, 0, 2 * Math.PI);
            canvasCtx.lineWidth = 8 * 1.2;
            canvasCtx.strokeStyle = "#00FF00"; // はっきりした緑
            canvasCtx.stroke();

            // ゲーム開始前の処理
            if (isCoolDown) {
                msgElement.innerText = "終了！ スコア: " + score;
            } else if (!hasClosedMouth) {
                msgElement.innerText = "一度口を閉じてください";
            } else {
                msgElement.innerText = "口を開けてスタート！";
                if (mouthOpen) {
                    fpo1x = landmarks[1].x;
                    fpo1y = landmarks[1].y;
                    gameStarted = true;
                    startTime = Date.now();
                    score = 0;
                    canScore = false; 
                    nextProblem();
                    speak("スタート");
                }
            }
        }

        if (!mouthOpen) {
            canScore = true;
            hasClosedMouth = true;
        }
    }
    canvasCtx.restore();
}

const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});
faceMesh.setOptions({
    maxNumFaces: 1, refineLandmarks: false,
    minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
});
faceMesh.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => { await faceMesh.send({image: videoElement}); },
    width: 640, height: 480
});
camera.start();

window.addEventListener('keydown', (e) => {
    if (e.key === "Escape") location.reload();
});
</script>
</body>
</html>
